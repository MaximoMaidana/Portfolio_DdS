<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mi Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/form.js"></script>
</head>
<body>
    <main class="container">
        <section class="seccion-contacto">
            <h2>Contactame</h2>
            <p>Si tienes alguna propuesta o consulta, no dudes en escribirme.</p>
            
            <form id="formulario-contacto" class="formulario" action="https://formspree.io/f/xeepwldy" method="POST">
                <div class="grupo-campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                </div>

                <div class="grupo-campo">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="grupo-campo">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué puedo ayudarte?" required></textarea>
                </div>

                <button type="submit" class="boton-enviar">Enviar Mensaje</button>
            </form>
        </section>
    </main>
 
</body>
</html>
